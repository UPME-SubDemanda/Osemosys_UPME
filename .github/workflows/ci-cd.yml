name: CI-CD

on:
  pull_request:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: osemosys-public-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Validate And Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          persist-credentials: false

      - name: Prepare env files
        run: |
          cp .env.example .env
          cp backend/.env.example backend/.env

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Ensure External Bridge Network
        run: docker network inspect osemosys_api_bridge >/dev/null 2>&1 || docker network create osemosys_api_bridge

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api/v1
          VITE_APP_ENV: production
          VITE_SIMULATION_MODE: api
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Run Backend Tests
        run: docker compose run --rm api python -m pytest -q

      - name: Build Backend And Frontend Images
        run: docker compose build api simulation-worker frontend

  deploy-staging:
    name: Deploy On Staging
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/develop'
    runs-on:
      - self-hosted
      - linux
    environment: staging
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          persist-credentials: false

      - name: Enforce Clean Deploy Revision
        run: |
          git fetch --force --prune --tags origin
          git checkout --force "${GITHUB_SHA}"
          git clean -ffdx

          ACTUAL_SHA="$(git rev-parse HEAD)"
          if [ "${ACTUAL_SHA}" != "${GITHUB_SHA}" ]; then
            echo "::error::Deploy checkout mismatch: expected ${GITHUB_SHA}, got ${ACTUAL_SHA}"
            exit 1
          fi

          echo "Deploying commit ${ACTUAL_SHA}"
          git status --short

      - name: Validate Required Secrets
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          if [ -z "${APP_PASSWORD}" ]; then
            echo "::error::Missing GitHub secret APP_PASSWORD"
            exit 1
          fi
          if [ -z "${SECRET_KEY}" ]; then
            echo "::error::Missing GitHub secret SECRET_KEY"
            exit 1
          fi

      - name: Run Deploy Script
        env:
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          APP_USERS: ${{ vars.APP_USERS }}
          APP_ADMIN_USERS: ${{ vars.APP_ADMIN_USERS }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          FRONTEND_BIND_HOST: ${{ vars.FRONTEND_BIND_HOST }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          FRONTEND_API_UPSTREAM: ${{ vars.FRONTEND_API_UPSTREAM }}
          BACKEND_BRIDGE_NETWORK: ${{ vars.BACKEND_BRIDGE_NETWORK }}
          API_BIND_HOST: ${{ vars.API_BIND_HOST }}
          API_PORT: ${{ vars.API_PORT }}
          API_WORKERS: ${{ vars.API_WORKERS }}
          POSTGRES_BIND_HOST: ${{ vars.POSTGRES_BIND_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          REDIS_BIND_HOST: ${{ vars.REDIS_BIND_HOST }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          BACKUP_BEFORE_MIGRATIONS: ${{ vars.BACKUP_BEFORE_MIGRATIONS }}
          BACKUP_DIR: ${{ vars.BACKUP_DIR }}
          BACKUP_RETENTION_DAYS: ${{ vars.BACKUP_RETENTION_DAYS }}
          RUN_SEED: ${{ vars.RUN_SEED }}
          SYNC_APP_USERS: ${{ vars.SYNC_APP_USERS }}
          SIM_WORKER_REPLICAS: ${{ vars.SIM_WORKER_REPLICAS }}
          SIM_MAX_CONCURRENCY: ${{ vars.SIM_MAX_CONCURRENCY }}
          SIM_USER_ACTIVE_LIMIT: ${{ vars.SIM_USER_ACTIVE_LIMIT }}
          SIM_TOTAL_WEIGHT_LIMIT: ${{ vars.SIM_TOTAL_WEIGHT_LIMIT }}
          SIM_WEIGHT_NATIONAL: ${{ vars.SIM_WEIGHT_NATIONAL }}
          SIM_WEIGHT_REGIONAL: ${{ vars.SIM_WEIGHT_REGIONAL }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_ENV: ${{ vars.VITE_APP_ENV }}
          VITE_SIMULATION_MODE: ${{ vars.VITE_SIMULATION_MODE }}
        run: |
          chmod +x scripts/deploy-local.sh
          COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME:-osemosys-public-stg}" \
          APP_USERS="${APP_USERS:-lcardona,jchavez,dbedoya}" \
          APP_ADMIN_USERS="${APP_ADMIN_USERS:-${APP_USERS:-lcardona,jchavez,dbedoya}}" \
          APP_PASSWORD="${APP_PASSWORD}" \
          SECRET_KEY="${SECRET_KEY}" \
          FRONTEND_BIND_HOST="${FRONTEND_BIND_HOST:-0.0.0.0}" \
          FRONTEND_PORT="${FRONTEND_PORT:-18080}" \
          FRONTEND_API_UPSTREAM="${FRONTEND_API_UPSTREAM:-api:8000}" \
          BACKEND_BRIDGE_NETWORK="${BACKEND_BRIDGE_NETWORK:-osemosys_api_bridge_stg}" \
          API_BIND_HOST="${API_BIND_HOST:-127.0.0.1}" \
          API_PORT="${API_PORT:-18110}" \
          API_WORKERS="${API_WORKERS:-3}" \
          POSTGRES_BIND_HOST="${POSTGRES_BIND_HOST:-127.0.0.1}" \
          POSTGRES_PORT="${POSTGRES_PORT:-15432}" \
          REDIS_BIND_HOST="${REDIS_BIND_HOST:-127.0.0.1}" \
          REDIS_PORT="${REDIS_PORT:-16379}" \
          BACKUP_BEFORE_MIGRATIONS="${BACKUP_BEFORE_MIGRATIONS:-1}" \
          BACKUP_DIR="${BACKUP_DIR:-${RUNNER_TEMP:-/tmp}/osemosys-backups}" \
          BACKUP_RETENTION_DAYS="${BACKUP_RETENTION_DAYS:-7}" \
          RUN_SEED="${RUN_SEED:-0}" \
          SYNC_APP_USERS="${SYNC_APP_USERS:-0}" \
          SIM_WORKER_REPLICAS="${SIM_WORKER_REPLICAS:-2}" \
          SIM_MAX_CONCURRENCY="${SIM_MAX_CONCURRENCY:-2}" \
          SIM_USER_ACTIVE_LIMIT="${SIM_USER_ACTIVE_LIMIT:-3}" \
          SIM_TOTAL_WEIGHT_LIMIT="${SIM_TOTAL_WEIGHT_LIMIT:-8}" \
          SIM_WEIGHT_NATIONAL="${SIM_WEIGHT_NATIONAL:-1}" \
          SIM_WEIGHT_REGIONAL="${SIM_WEIGHT_REGIONAL:-3}" \
          VITE_API_BASE_URL="${VITE_API_BASE_URL:-/api/v1}" \
          VITE_APP_ENV="${VITE_APP_ENV:-staging}" \
          VITE_SIMULATION_MODE="${VITE_SIMULATION_MODE:-api}" \
          ./scripts/deploy-local.sh

      - name: Smoke Checks
        env:
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          API_PORT: ${{ vars.API_PORT }}
        run: |
          export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME:-osemosys-public-stg}"
          FRONTEND_PORT="${FRONTEND_PORT:-18080}"
          API_PORT="${API_PORT:-18110}"
          curl -fsS "http://127.0.0.1:${FRONTEND_PORT}/api/v1/health"
          curl -fsS "http://127.0.0.1:${FRONTEND_PORT}/api/v1/health/ready"
          curl -fsS "http://127.0.0.1:${API_PORT}/api/v1/health"
          for _ in $(seq 1 30); do
            if docker compose exec -T simulation-worker sh -lc \
              'celery -A app.simulation.celery_app:celery_app inspect ping --timeout=5 >/dev/null 2>&1'; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::Celery inspect ping did not respond in time"
          exit 1

  deploy-production:
    name: Deploy On Production
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - linux
    environment: production
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          persist-credentials: false

      - name: Enforce Clean Deploy Revision
        run: |
          git fetch --force --prune --tags origin
          git checkout --force "${GITHUB_SHA}"
          git clean -ffdx

          ACTUAL_SHA="$(git rev-parse HEAD)"
          if [ "${ACTUAL_SHA}" != "${GITHUB_SHA}" ]; then
            echo "::error::Deploy checkout mismatch: expected ${GITHUB_SHA}, got ${ACTUAL_SHA}"
            exit 1
          fi

          echo "Deploying commit ${ACTUAL_SHA}"
          git status --short

      - name: Validate Required Secrets
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          if [ -z "${APP_PASSWORD}" ]; then
            echo "::error::Missing GitHub secret APP_PASSWORD"
            exit 1
          fi
          if [ -z "${SECRET_KEY}" ]; then
            echo "::error::Missing GitHub secret SECRET_KEY"
            exit 1
          fi

      - name: Run Deploy Script
        env:
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          APP_USERS: ${{ vars.APP_USERS }}
          APP_ADMIN_USERS: ${{ vars.APP_ADMIN_USERS }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          FRONTEND_BIND_HOST: ${{ vars.FRONTEND_BIND_HOST }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          FRONTEND_API_UPSTREAM: ${{ vars.FRONTEND_API_UPSTREAM }}
          BACKEND_BRIDGE_NETWORK: ${{ vars.BACKEND_BRIDGE_NETWORK }}
          API_BIND_HOST: ${{ vars.API_BIND_HOST }}
          API_PORT: ${{ vars.API_PORT }}
          API_WORKERS: ${{ vars.API_WORKERS }}
          POSTGRES_BIND_HOST: ${{ vars.POSTGRES_BIND_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
          REDIS_BIND_HOST: ${{ vars.REDIS_BIND_HOST }}
          REDIS_PORT: ${{ vars.REDIS_PORT }}
          BACKUP_BEFORE_MIGRATIONS: ${{ vars.BACKUP_BEFORE_MIGRATIONS }}
          BACKUP_DIR: ${{ vars.BACKUP_DIR }}
          BACKUP_RETENTION_DAYS: ${{ vars.BACKUP_RETENTION_DAYS }}
          RUN_SEED: ${{ vars.RUN_SEED }}
          SYNC_APP_USERS: ${{ vars.SYNC_APP_USERS }}
          SIM_WORKER_REPLICAS: ${{ vars.SIM_WORKER_REPLICAS }}
          SIM_MAX_CONCURRENCY: ${{ vars.SIM_MAX_CONCURRENCY }}
          SIM_USER_ACTIVE_LIMIT: ${{ vars.SIM_USER_ACTIVE_LIMIT }}
          SIM_TOTAL_WEIGHT_LIMIT: ${{ vars.SIM_TOTAL_WEIGHT_LIMIT }}
          SIM_WEIGHT_NATIONAL: ${{ vars.SIM_WEIGHT_NATIONAL }}
          SIM_WEIGHT_REGIONAL: ${{ vars.SIM_WEIGHT_REGIONAL }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_ENV: ${{ vars.VITE_APP_ENV }}
          VITE_SIMULATION_MODE: ${{ vars.VITE_SIMULATION_MODE }}
        run: |
          normalize_unified_monorepo_env() {
            if grep -Eq '^  frontend:$' docker-compose.yml && [ "${COMPOSE_PROJECT_NAME:-}" = "osemosys-backend" ]; then
              echo "Normalizing stale backend-only production variables to unified monorepo defaults"
              COMPOSE_PROJECT_NAME=osemosys
              FRONTEND_BIND_HOST=0.0.0.0
              FRONTEND_PORT=80
              FRONTEND_API_UPSTREAM=api:8000
              API_BIND_HOST=127.0.0.1
              API_PORT=8010
              API_WORKERS="${API_WORKERS:-3}"
              POSTGRES_BIND_HOST=127.0.0.1
              POSTGRES_PORT=5433
              REDIS_BIND_HOST=127.0.0.1
              REDIS_PORT=6379
              BACKEND_BRIDGE_NETWORK=osemosys_api_bridge
            fi
          }

          normalize_unified_monorepo_env
          chmod +x scripts/deploy-local.sh
          COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME:-osemosys}" \
          APP_USERS="${APP_USERS:-lcardona,jchavez,dbedoya}" \
          APP_ADMIN_USERS="${APP_ADMIN_USERS:-${APP_USERS:-lcardona,jchavez,dbedoya}}" \
          APP_PASSWORD="${APP_PASSWORD}" \
          SECRET_KEY="${SECRET_KEY}" \
          FRONTEND_BIND_HOST="${FRONTEND_BIND_HOST:-0.0.0.0}" \
          FRONTEND_PORT="${FRONTEND_PORT:-80}" \
          FRONTEND_API_UPSTREAM="${FRONTEND_API_UPSTREAM:-api:8000}" \
          BACKEND_BRIDGE_NETWORK="${BACKEND_BRIDGE_NETWORK:-osemosys_api_bridge}" \
          API_BIND_HOST="${API_BIND_HOST:-127.0.0.1}" \
          API_PORT="${API_PORT:-8010}" \
          API_WORKERS="${API_WORKERS:-3}" \
          POSTGRES_BIND_HOST="${POSTGRES_BIND_HOST:-127.0.0.1}" \
          POSTGRES_PORT="${POSTGRES_PORT:-5433}" \
          REDIS_BIND_HOST="${REDIS_BIND_HOST:-127.0.0.1}" \
          REDIS_PORT="${REDIS_PORT:-6379}" \
          BACKUP_BEFORE_MIGRATIONS="${BACKUP_BEFORE_MIGRATIONS:-1}" \
          BACKUP_DIR="${BACKUP_DIR:-${RUNNER_TEMP:-/tmp}/osemosys-backups}" \
          BACKUP_RETENTION_DAYS="${BACKUP_RETENTION_DAYS:-7}" \
          RUN_SEED="${RUN_SEED:-1}" \
          SYNC_APP_USERS="${SYNC_APP_USERS:-1}" \
          SIM_WORKER_REPLICAS="${SIM_WORKER_REPLICAS:-2}" \
          SIM_MAX_CONCURRENCY="${SIM_MAX_CONCURRENCY:-2}" \
          SIM_USER_ACTIVE_LIMIT="${SIM_USER_ACTIVE_LIMIT:-3}" \
          SIM_TOTAL_WEIGHT_LIMIT="${SIM_TOTAL_WEIGHT_LIMIT:-8}" \
          SIM_WEIGHT_NATIONAL="${SIM_WEIGHT_NATIONAL:-1}" \
          SIM_WEIGHT_REGIONAL="${SIM_WEIGHT_REGIONAL:-3}" \
          VITE_API_BASE_URL="${VITE_API_BASE_URL:-/api/v1}" \
          VITE_APP_ENV="${VITE_APP_ENV:-production}" \
          VITE_SIMULATION_MODE="${VITE_SIMULATION_MODE:-api}" \
          ./scripts/deploy-local.sh

      - name: Smoke Checks
        env:
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          API_PORT: ${{ vars.API_PORT }}
        run: |
          if grep -Eq '^  frontend:$' docker-compose.yml && [ "${COMPOSE_PROJECT_NAME:-}" = "osemosys-backend" ]; then
            echo "Normalizing stale backend-only production variables before smoke checks"
            COMPOSE_PROJECT_NAME=osemosys
            FRONTEND_PORT=80
            API_PORT=8010
          fi
          export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME:-osemosys}"
          FRONTEND_PORT="${FRONTEND_PORT:-80}"
          API_PORT="${API_PORT:-8010}"
          curl -fsS "http://127.0.0.1:${FRONTEND_PORT}/api/v1/health"
          curl -fsS "http://127.0.0.1:${FRONTEND_PORT}/api/v1/health/ready"
          curl -fsS "http://127.0.0.1:${API_PORT}/api/v1/health"
          for _ in $(seq 1 30); do
            if docker compose exec -T simulation-worker sh -lc \
              'celery -A app.simulation.celery_app:celery_app inspect ping --timeout=5 >/dev/null 2>&1'; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::Celery inspect ping did not respond in time"
          exit 1
