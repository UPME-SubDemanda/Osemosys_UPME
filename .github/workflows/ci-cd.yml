name: CI-CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: osemosys-production-main
  cancel-in-progress: false

jobs:
  ci:
    name: Validate And Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env files
        run: |
          cp .env.example .env
          cp backend/.env.example backend/.env

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Ensure External Bridge Network
        run: docker network inspect osemosys_api_bridge >/dev/null 2>&1 || docker network create osemosys_api_bridge

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Run Backend Tests
        run: docker compose run --rm api python -m pytest -q

      - name: Build Backend And Frontend Images
        run: docker compose build api simulation-worker frontend

  deploy:
    name: Deploy On Server
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on:
      - self-hosted
      - linux
    environment: production
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Required Secret
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          if [ -z "${APP_PASSWORD}" ]; then
            echo "::error::Missing GitHub secret APP_PASSWORD"
            exit 1
          fi

      - name: Run Deploy Script
        env:
          APP_USERS: ${{ vars.APP_USERS }}
          APP_ADMIN_USERS: ${{ vars.APP_ADMIN_USERS }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          FRONTEND_API_UPSTREAM: ${{ vars.FRONTEND_API_UPSTREAM }}
          BACKEND_BRIDGE_NETWORK: ${{ vars.BACKEND_BRIDGE_NETWORK }}
          API_WORKERS: ${{ vars.API_WORKERS }}
          BACKUP_BEFORE_MIGRATIONS: ${{ vars.BACKUP_BEFORE_MIGRATIONS }}
          BACKUP_DIR: ${{ vars.BACKUP_DIR }}
          BACKUP_RETENTION_DAYS: ${{ vars.BACKUP_RETENTION_DAYS }}
          RUN_SEED: ${{ vars.RUN_SEED }}
          SIM_WORKER_REPLICAS: ${{ vars.SIM_WORKER_REPLICAS }}
          SIM_MAX_CONCURRENCY: ${{ vars.SIM_MAX_CONCURRENCY }}
          SIM_USER_ACTIVE_LIMIT: ${{ vars.SIM_USER_ACTIVE_LIMIT }}
        run: |
          chmod +x scripts/deploy-local.sh
          APP_USERS="${APP_USERS:-lcardona,jchavez,dbedoya}" \
          APP_ADMIN_USERS="${APP_ADMIN_USERS:-${APP_USERS:-lcardona,jchavez,dbedoya}}" \
          APP_PASSWORD="${APP_PASSWORD}" \
          FRONTEND_PORT="${FRONTEND_PORT:-80}" \
          FRONTEND_API_UPSTREAM="${FRONTEND_API_UPSTREAM:-api:8000}" \
          BACKEND_BRIDGE_NETWORK="${BACKEND_BRIDGE_NETWORK:-osemosys_api_bridge}" \
          API_WORKERS="${API_WORKERS:-3}" \
          BACKUP_BEFORE_MIGRATIONS="${BACKUP_BEFORE_MIGRATIONS:-1}" \
          BACKUP_DIR="${BACKUP_DIR:-${RUNNER_TEMP:-/tmp}/osemosys-backups}" \
          BACKUP_RETENTION_DAYS="${BACKUP_RETENTION_DAYS:-7}" \
          RUN_SEED="${RUN_SEED:-1}" \
          POSTGRES_PORT="${POSTGRES_PORT:-5433}" \
          SIM_WORKER_REPLICAS="${SIM_WORKER_REPLICAS:-2}" \
          SIM_MAX_CONCURRENCY="${SIM_MAX_CONCURRENCY:-2}" \
          SIM_USER_ACTIVE_LIMIT="${SIM_USER_ACTIVE_LIMIT:-4}" \
          ./scripts/deploy-local.sh

      - name: Smoke Checks
        env:
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
        run: |
          FRONTEND_PORT="${FRONTEND_PORT:-80}"
          curl -fsS "http://127.0.0.1:${FRONTEND_PORT}/api/v1/health"
          curl -fsS "http://127.0.0.1:${FRONTEND_PORT}/api/v1/health/ready"
          docker compose exec -T simulation-worker sh -lc \
            'celery -A app.simulation.celery_app:celery_app inspect ping -d "simulation-worker@$(hostname)"'
