server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 ipv6=off valid=10s;

  root /usr/share/nginx/html;
  index index.html;

  # Seguridad básica (sin pretender reemplazar un WAF):
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Si tu app no usa iframes/inline scripts, puedes endurecer CSP.
  # Para SPAs modernas, CSP puede requerir ajustes según librerías.
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https: http:; frame-ancestors 'none'; base-uri 'self'" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;
  # Permite carga de archivos Excel grandes en importación oficial.
  client_max_body_size 200m;

  # Cache agresivo para assets con hash (Vite genera nombres con hash).
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy al backend FastAPI dentro de Docker Compose.
  location /api/ {
    set $api_upstream http://${API_UPSTREAM};
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # El endpoint concatenate-sand devuelve un resumen codificado en headers.
    # Aumentamos buffers para evitar 502 por "upstream sent too big header".
    proxy_buffer_size 128k;
    proxy_buffers 8 128k;
    proxy_busy_buffers_size 256k;
    proxy_read_timeout 1800s;
    proxy_send_timeout 1800s;
    proxy_request_buffering off;
    proxy_buffering off;
  }
}
